<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MLB AI Reporting</title>
    <link rel="stylesheet" href="./assets/mlb-ai.css" />
  </head>
  <body data-page="reporting">
    <div class="shell">
      <header class="page-header">
        <div>
          <p class="eyebrow">Reporting</p>
          <h1>MLB AI performance review</h1>
          <p class="lede">Historical and shadow reporting for the active engine and its required comparators.</p>
        </div>
        <a class="back-link" href="./index.html">Overview</a>
      </header>

      <section class="panel meta-panel" id="reporting-meta"></section>

      <section class="panel">
        <div class="section-head">
          <h2>Policy summary</h2>
        </div>
        <div id="policy-summary-grid" class="summary-grid"></div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Monthly stats</h2>
          <span class="badge">Non-cumulative</span>
        </div>
        <div class="table-wrap">
          <table id="monthly-table">
            <thead>
              <tr>
                <th>Month</th>
                <th>Policy</th>
                <th>Bets</th>
                <th>Wins</th>
                <th>Losses</th>
                <th>Pushes</th>
                <th>Win %</th>
                <th>Units</th>
                <th>ROI</th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </section>

      <section class="panel">
        <div class="section-head">
          <h2>Context breakdowns</h2>
        </div>
        <div id="context-breakdowns" class="context-grid"></div>
      </section>
    </div>
    <script src="./assets/mlb-ai-site.js"></script>
  </body>
</html>
